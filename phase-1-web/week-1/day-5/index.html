<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Menu</title>
    <style>
        /* Global styles */
        body {
            background-color: #f5f5dc;
            font-family: sans-serif;
        }
        
        h1, h2 {
            font-family: Impact, serif;
            text-align: center;
        }
        
        p {
            text-align: center;
        }
        
        /* Menu container - Box Model applied here */
        .menu {
            width: 80%;
            background-color: burlywood;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            max-width: 500px;
        }
        
        /* Image styles */
        img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
        }
        
        /* The divider line */
        .divider {
            border-bottom: 4px solid brown;
            margin: 20px 0;
        }
        
        /* Flexbox for each menu item row */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }
        
        /* Style the coffee and dessert names */
        .coffee, .dessert {
            font-size: 18px;
        }
        
        /* Footer text */
        .established {
            font-style: italic;
        }
        
        .address {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="menu">
        <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="Coffee Icon" width="50">
        <h1>Welcome to My Cafe</h1>
        <p class="established">Est. 2020</p>
        <div class="divider"></div>
        
        <h2>Coffee</h2>
        <div class="item">
            <p class="coffee">French Vanilla</p>
            <p class="price">$3.00</p>
        </div>
        <div class="item">
            <p class="coffee">Caramel Macchiato</p>
            <p class="price">$3.75</p>
        </div>
        <div class="item">
            <p class="coffee">Pumpkin Spice</p>
            <p class="price">$3.50</p>
        </div>
        <div class="item">
            <p class="coffee">Hazelnut</p>
            <p class="price">$4.00</p>
        </div>
        <div class="item">
            <p class="coffee">Mocha</p>
            <p class="price">$4.50</p>
        </div>
        
        <div class="divider"></div>
        
        <h2>Desserts</h2>
        <div class="item">
            <p class="dessert">Donut</p>
            <p class="price">$1.50</p>
        </div>
        <div class="item">
            <p class="dessert">Cheesecake</p>
            <p class="price">$2.75</p>
        </div>
        <div class="item">
            <p class="dessert">Cinammon Roll</p>
            <p class="price">$2.50</p>
        </div>
        <div class="item">
            <p class="dessert">Chocolate Cake</p>
            <p class="price">$3.00</p>
        </div>
        
        <div class="divider"></div>
        
        <p class="address">123 Main Street, Coffee City</p>
    </div>
</body>
</html>
