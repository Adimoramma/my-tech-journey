<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* ---------- INPUT SECTION ---------- */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-section input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #3498db;
        }

        .input-section button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .input-section button:hover {
            background-color: #2980b9;
        }

        /* ---------- STATS & FILTERS ---------- */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #ecf0f1;
            font-size: 14px;
            color: #7f8c8d;
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        .filters button {
            padding: 5px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filters button:hover {
            background-color: #ecf0f1;
        }

        .filters button.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        /* ---------- TASK LIST ---------- */
        #taskList {
            list-style: none;
            padding: 0;
        }

        #taskList li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background-color 0.3s;
            animation: fadeIn 0.3s ease;
        }

        #taskList li:hover {
            background-color: #ecf0f1;
        }

        #taskList li .task-text {
            flex: 1;
            font-size: 16px;
            word-break: break-word;
        }

        #taskList li .task-text.completed {
            text-decoration: line-through;
            color: #7f8c8d;
        }

        #taskList li input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        #taskList li .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.3s;
            flex-shrink: 0;
        }

        #taskList li .delete-btn:hover {
            background-color: #c0392b;
        }

        .empty-message {
            text-align: center;
            color: #7f8c8d;
            padding: 30px 0;
        }

        /* ---------- ANIMATIONS ---------- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }

            .input-section {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
                text-align: center;
            }

            .filters {
                justify-content: center;
            }

            #taskList li {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 My To-Do List</h1>

        <!-- INPUT SECTION -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task..." />
            <button id="addBtn">Add Task</button>
        </div>

        <!-- STATS & FILTERS -->
        <div class="stats">
            <span id="taskCount">0 tasks remaining</span>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <!-- TASK LIST -->
        <ul id="taskList">
            <li class="empty-message">No tasks yet. Add one above! 🚀</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
